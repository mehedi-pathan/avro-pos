name: Build Avro POS

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Create .env and Credentials
        shell: bash
        run: |
          echo "DATABASE_URL=\"file:./dev.db\"" > .env
          echo "GOOGLE_APPLICATION_CREDENTIALS=\"credentials/google-oauth.json\"" >> .env
          mkdir -p credentials
          echo "${{ secrets.GCP_SA_KEY_BASE64 }}" | base64 --decode > credentials/google-oauth.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client for runner platform
        run: npx prisma generate

      - name: Build renderer and Electron main
        run: npm run build

      - name: Package desktop app
        run: npx electron-builder --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: avro-pos-${{ matrix.os }}
          path: release/**
