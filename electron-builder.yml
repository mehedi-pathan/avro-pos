appId: com.avro.pos
productName: Avro POS
asar: true

directories:
  output: release
  buildResources: build

files:
  - dist/main/main.js
  - dist/main/preload.js
  - dist/main/services/**/*
  - dist/renderer/**/*
  - package.json
  - prisma/schema.prisma
  - prisma/migrations/**/*
  - node_modules/.prisma/**/*

extraResources:
  - from: prisma/schema.prisma
    to: prisma/schema.prisma
  - from: prisma/migrations
    to: prisma/migrations
  - from: node_modules/.prisma
    to: node_modules/.prisma
    filter:
      - "**/*"

mac:
  category: public.app-category.business
  target:
    - dmg

win:
  target:
    - nsis

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

publish:
  provider: github
  owner: mehedi-pathan
  repo: avro-pos
  releaseType: release
